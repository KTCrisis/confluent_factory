environment:

  - name : "MFS-dev"
    stream_governance_package : "ESSENTIALS"
    network:
      - name: "PSC-KFK-DEV"
        connection_types: "PRIVATELINK"
        cloud_provider: "GCP"
        region: "europe-west1"       
        zones: ["europe-west1-b", "europe-west1-c", "europe-west1-d"]
        network_config :  
        
          - ingress_connection_name: "PSC-1"  
            project_id: "id1"

    cluster :
      name : "mfs-cluster-dev"
      type : "dedicated"
      cloud_provider : "GCP"
      region : "europe-west1"
      availability_zone : "SINGLE_ZONE"
      cku : 1
      network : "PSC-KFK-DEV"

    ksql :
       csu : 1  

    flink:
      max_cfu: 5

